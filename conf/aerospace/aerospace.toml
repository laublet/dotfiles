# https://github.com/nikitabobko/AeroSpace
# ~/.aerospace.toml — Loïc
#
# Modifier architecture:
#   ctrl-cmd-alt (LCAG)       → AeroSpace focus / layout / split
#   ctrl-cmd-alt-shift (HYPR) → AeroSpace move / resize
#   cmd-alt                   → AeroSpace workspaces
#   cmd-alt-shift             → AeroSpace move-node-to-workspace / monitor
#   cmd + ctrl                → In-app resize (WezTerm/Neovim/Cursor)
#   ctrl                      → In-app split navigation (WezTerm/Neovim/Cursor)
#

# after-login-command was removed in AeroSpace 0.19.0 (SMAppService migration).
# App launches: macOS Login Items (System Settings > General > Login Items).
#   Required at boot: Mouseless (hotkeys), WezTerm, … — AeroSpace uses start-at-login below.
#   Prefs apps (System Settings, SteerMouse): open on demand; no Login Item needed.
# Dev layout: after-startup-command runs layout-dev-ws.sh once (~30s after login).

# NOTE: do NOT run `brew services start borders` — that registers a
# LaunchAgent which spawns `borders` at login WITHOUT arguments (so the
# defaults apply, no purple gradient). Since `borders` is single-instance,
# the command below is then ignored and we lose our colors.
# If borders lost colors: `just mac-borders` (or brew services stop borders && pkill borders)
# then re-login (or run the command below manually).
after-startup-command = [
    'exec-and-forget borders style=round active_color="gradient(top_left=0xffbd93f9,bottom_right=0xffff79c6)" inactive_color=0xff6272a4 width=6.0 hidpi=on',
    'exec-and-forget sleep 30 && ~/.config/aerospace/layout-dev-ws.sh',
]

start-at-login = true

# Normalizations: simplifient l'arbre de tiling (recommandé par la doc)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Empêche cmd-h de cacher des fenêtres hors du tiling
automatically-unhide-macos-hidden-apps = true

# Kyria encoder scroll: macOS sends wheel events to the window under the cursor.
# window-lazy-center on focus; monitor fallback when dragging across displays.
# Replaces Hammerspoon (see archive/hammerspoon). If resize/float edge cases annoy,
# bind move-mouse only on LCAG focus keys instead of on-focus-changed.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

accordion-padding = 30
# Stack windows by workspace (vertical accordion at root level).
default-root-container-layout = 'accordion'
default-root-container-orientation = 'vertical'
key-mapping.preset = 'qwerty'

[gaps]
inner.horizontal = 26
inner.vertical =   26
outer.left =       14
outer.bottom =     14
outer.top =        14
outer.right =      14

[exec]
inherit-env-vars = true
[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# ============================================================================
# MAIN MODE
# ============================================================================
[mode.main.binding]

# Disable macOS hide app (interfère avec le tiling)
cmd-h = []

# --- Terminal (LCAG + enter = new window, LCAG + backtick = focus existing) ---
ctrl-cmd-alt-enter = 'exec-and-forget open -n -a WezTerm'
ctrl-cmd-alt-backtick = '''exec-and-forget osascript -e 'tell application "WezTerm" to activate' '''

# --- Focus window (LCAG + arrows, wrap-around) — Mouseless overlay captures keys while visible, so no fight with LCAG+←/→ ---
ctrl-cmd-alt-left  = 'focus --boundaries-action wrap-around-the-workspace left'
ctrl-cmd-alt-down  = 'focus --boundaries-action wrap-around-the-workspace down'
ctrl-cmd-alt-up    = 'focus --boundaries-action wrap-around-the-workspace up'
ctrl-cmd-alt-right = 'focus --boundaries-action wrap-around-the-workspace right'

# --- Move window (HYPR + arrows) ---
ctrl-cmd-alt-shift-left  = 'move left'
ctrl-cmd-alt-shift-down  = 'move down'
ctrl-cmd-alt-shift-up    = 'move up'
ctrl-cmd-alt-shift-right = 'move right'

# --- Resize (HYPR + minus/equal) ---
ctrl-cmd-alt-shift-minus = 'resize smart -50'
ctrl-cmd-alt-shift-equal = 'resize smart +50'

# --- Layout (LCAG + key) ---
ctrl-cmd-alt-s = 'layout v_accordion'
ctrl-cmd-alt-w = 'layout h_accordion'
ctrl-cmd-alt-e = 'layout tiles horizontal vertical'
ctrl-cmd-alt-t = 'layout floating tiling'

# --- Join-with (LCAG + lettre mnemonique) ---
ctrl-cmd-alt-r = 'join-with right'
ctrl-cmd-alt-l = 'join-with left'
ctrl-cmd-alt-u = 'join-with up'
ctrl-cmd-alt-d = 'join-with down'

# --- Balance sizes (LCAG + equal) ---
ctrl-cmd-alt-equal = 'balance-sizes'

# --- Fullscreen ---
ctrl-cmd-alt-f = 'fullscreen'
ctrl-cmd-alt-shift-f = 'macos-native-fullscreen'

# --- Workspaces (cmd-alt) ---
cmd-alt-left  = 'workspace prev'
cmd-alt-right = 'workspace next'
cmd-alt-tab   = 'workspace-back-and-forth'

cmd-alt-0 = 'workspace 0'
cmd-alt-1 = 'workspace 1'
cmd-alt-2 = 'workspace 2'
cmd-alt-3 = 'workspace 3'
cmd-alt-4 = 'workspace 4'
cmd-alt-5 = 'workspace 5'
cmd-alt-6 = 'workspace 6'
cmd-alt-7 = 'workspace 7'
cmd-alt-8 = 'workspace 8'
cmd-alt-9 = 'workspace 9'

# --- Move node to workspace (cmd-alt-shift + number) ---
cmd-alt-shift-0 = 'move-node-to-workspace 0'
cmd-alt-shift-1 = 'move-node-to-workspace 1'
cmd-alt-shift-2 = 'move-node-to-workspace 2'
cmd-alt-shift-3 = 'move-node-to-workspace 3'
cmd-alt-shift-4 = 'move-node-to-workspace 4'
cmd-alt-shift-5 = 'move-node-to-workspace 5'
cmd-alt-shift-6 = 'move-node-to-workspace 6'
cmd-alt-shift-7 = 'move-node-to-workspace 7'
cmd-alt-shift-8 = 'move-node-to-workspace 8'
cmd-alt-shift-9 = 'move-node-to-workspace 9'

# --- Monitor (cmd-alt + arrows = focus, cmd-alt-shift + arrows = move node) ---
cmd-alt-down = 'focus-monitor --wrap-around next'
cmd-alt-up   = 'focus-monitor --wrap-around prev'

cmd-alt-shift-down = 'move-node-to-monitor --wrap-around next'
cmd-alt-shift-up   = 'move-node-to-monitor --wrap-around prev'

cmd-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# --- Service mode (HYPR + semicolon) ---
ctrl-cmd-alt-shift-semicolon = 'mode service'

# ============================================================================
# SERVICE MODE
# ============================================================================
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
equal = ['balance-sizes', 'mode main']

# Join-with (reste dans le service mode pour enchaîner)
left  = 'join-with left'
down  = 'join-with down'
up    = 'join-with up'
right = 'join-with right'

# Layout (applique et sort du service mode)
s = ['layout v_accordion', 'mode main']
w = ['layout h_accordion', 'mode main']
e = ['layout tiles horizontal vertical', 'mode main']

# Re-apply 2-column dev layout on WS 1
l = ['exec-and-forget ~/.config/aerospace/layout-dev-ws.sh', 'mode main']

# ============================================================================
# WORKSPACE → MONITOR ASSIGNMENTS
# ============================================================================
[workspace-to-monitor-force-assignment]
0 = 'main'
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'secondary'
5 = 'secondary'
6 = 'secondary'
7 = 'secondary'
8 = 'secondary'
9 = 'secondary'

# ============================================================================
# WINDOW RULES
# ============================================================================
# Rules apply to all new windows so that staggered after-login-command
# launches land on the right workspace.
# Manual override: cmd-alt-shift-N to move a window wherever you want.
#
# WS 0 — Dashboard / Planning
# WS 1 — Work / Comms
# WS 2 — Dev (main workspace)
# WS 3 — Test / Browse
# WS 4–9 — Spill workspaces on secondary monitor (cmd-alt-4…9). No auto-rules for prefs/utilities.
# System Settings, SteerMouse, etc. open on whichever workspace is focused when launched.

# --- WS 0: Dashboard / Planning ---
[[on-window-detected]]
if.app-id = 'com.apple.iCal'
check-further-callbacks = true
run = ['move-node-to-workspace 0']

[[on-window-detected]]
if.app-id = 'com.todoist.mac.Todoist'
check-further-callbacks = true
run = ['move-node-to-workspace 0']

[[on-window-detected]]
if.app-id = 'com.apple.Music'
check-further-callbacks = true
run = ['move-node-to-workspace 0']

[[on-window-detected]]
if.app-id = 'com.apple.podcasts'
check-further-callbacks = true
run = ['move-node-to-workspace 0']

# --- WS 1: Work / Comms ---
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
check-further-callbacks = true
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
check-further-callbacks = true
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
check-further-callbacks = true
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'org.mozilla.Thunderbird'
check-further-callbacks = true
run = ['move-node-to-workspace 1']

# --- WS 2: Dev ---
[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
check-further-callbacks = true
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-name-regex-substring = 'Cursor'
check-further-callbacks = true
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefoxdeveloperedition'
check-further-callbacks = true
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'md.obsidian'
check-further-callbacks = true
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
check-further-callbacks = true
run = ['move-node-to-workspace 2']

# --- WS 3: Test / Browse ---
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
check-further-callbacks = true
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.postmanlabs.mac'
check-further-callbacks = true
run = ['move-node-to-workspace 3']

# --- Prefs / utilities (no workspace rule) ---
# com.apple.systempreferences, com.apple.SystemSettings, jp.plentycom.app.SteerMouse: stay on focused workspace.

# --- Always floating (popups, utilities) ---
# (Raycast manages its own popup natively; no AeroSpace rule needed.)
