# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Feel free to omit keys that you don't use in your config.
# If the key is absent in your config the default value is taken from this config

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 20
inner.vertical =   20
outer.left =       10
outer.bottom =     10
outer.top =        10
outer.right =      10

# See https://nikitabobko.github.io/AeroSpace/guide#exec-env-vars
[exec]
inherit-env-vars = true
[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
[mode.main.binding]


# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# You can uncomment this line to open up terminal with mod + enter shortcut
# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
ctrl-cmd-alt-enter = 'exec-and-forget open -n /System/Applications/WezTerm.app'


# See: https://nikitabobko.github.io/AeroSpace/commands#layout
ctrl-cmd-alt-s = 'layout v_accordion'
ctrl-cmd-alt-w = 'layout h_accordion'
ctrl-cmd-alt-e = 'layout tiles horizontal vertical'

ctrl-shift-space = 'layout floating tiling'

ctrl-cmd-alt-b = 'split horizontal'
ctrl-cmd-alt-v = 'split vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
ctrl-cmd-alt-h = 'focus left'
ctrl-cmd-alt-j = 'focus down'
ctrl-cmd-alt-k = 'focus up'
ctrl-cmd-alt-l = 'focus right'

ctrl-cmd-alt-left = 'focus left'
ctrl-cmd-alt-down = 'focus down'
ctrl-cmd-alt-up = 'focus up'
ctrl-cmd-alt-right = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
ctrl-cmd-alt-shift-h = 'move left'
ctrl-cmd-alt-shift-j = 'move down'
ctrl-cmd-alt-shift-k = 'move up'
ctrl-cmd-alt-shift-l = 'move right'

ctrl-cmd-alt-shift-left = 'move left'
ctrl-cmd-alt-shift-down = 'move down'
ctrl-cmd-alt-shift-up = 'move up'
ctrl-cmd-alt-shift-right = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
ctrl-cmd-alt-shift-minus = 'resize smart -50'
ctrl-cmd-alt-shift-equal = 'resize smart +50'

ctrl-cmd-alt-f = 'fullscreen'

ctrl-cmd-alt-shift-f = 'macos-native-fullscreen'
ctrl-cmd-alt-shift-m = 'macos-native-minimize'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
cmd-alt-h = "workspace prev"  # Switch to the next workspace
cmd-alt-l = "workspace next"  # Switch to the previous workspace

cmd-alt-left = "workspace prev"  # Switch to the next workspace
cmd-alt-right = "workspace next"  # Switch to the previous workspace

cmd-alt-j = "focus-monitor --wrap-around next"  # Switch to the next monitor
cmd-alt-k = "focus-monitor --wrap-around prev"  # Switch to the previous monitor

cmd-alt-down = "focus-monitor --wrap-around next"  # Switch to the next monitor
cmd-alt-up = "focus-monitor --wrap-around prev"  # Switch to the previous monitor

cmd-alt-shift-e = "move-node-to-monitor up"
cmd-alt-shift-n = "move-node-to-monitor down"

cmd-alt-shift-u = "move-workspace-to-monitor --wrap-around prev"
cmd-alt-shift-d = "move-workspace-to-monitor --wrap-around next"

cmd-alt-0 = 'workspace 0'
cmd-alt-1 = 'workspace 1'
cmd-alt-2 = 'workspace 2'
cmd-alt-3 = 'workspace 3'
cmd-alt-4 = 'workspace 4'
cmd-alt-5 = 'workspace 5'
cmd-alt-6 = 'workspace 6'
cmd-alt-7 = 'workspace 7'
cmd-alt-8 = 'workspace 8'
cmd-alt-9 = 'workspace 9'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
cmd-alt-shift-0 = 'move-node-to-workspace 0'
cmd-alt-shift-1 = 'move-node-to-workspace 1'
cmd-alt-shift-2 = 'move-node-to-workspace 2'
cmd-alt-shift-3 = 'move-node-to-workspace 3'
cmd-alt-shift-4 = 'move-node-to-workspace 4'
cmd-alt-shift-5 = 'move-node-to-workspace 5'
cmd-alt-shift-6 = 'move-node-to-workspace 6'
cmd-alt-shift-7 = 'move-node-to-workspace 7'
cmd-alt-shift-8 = 'move-node-to-workspace 8'
cmd-alt-shift-9 = 'move-node-to-workspace 9'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
cmd-alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
cmd-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'



# See: https://ikitabobko.github.io/AeroSpace/commands#mode
ctrl-cmd-alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
#s = ['layout sticky tiling', 'mode main'] # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

ctrl-cmd-alt-shift-h = ['join-with left', 'mode main']
ctrl-cmd-alt-shift-j = ['join-with down', 'mode main']
ctrl-cmd-alt-shift-k = ['join-with up', 'mode main']
ctrl-cmd-alt-shift-l = ['join-with right', 'mode main']

[workspace-to-monitor-force-assignment]
0 = 'main'
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'secondary'
5 = 'secondary'
6 = 'secondary'
7 = 'secondary'
8 = 'secondary'
9 = 'secondary'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['layout tiling' ,'move-node-to-workspace 0']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['layout tiling' ,'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'md.obsidian'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefoxdeveloperedition'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['layout tiling', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.openai.chat'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-name-regex-substring = 'Cursor'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['layout tiling' ,'move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['layout tiling','move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.postmanlabs.mac'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'jp.plentycom.app.SteerMouse'
if.during-aerospace-startup = true
check-further-callbacks = true
run = ['move-node-to-workspace 6']