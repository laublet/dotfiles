# https://github.com/rvaiya/keyd
# /etc/keyd/default.conf — macOS-like behavior on Linux
#
# Custom keyboard (QMK) sends the correct keycodes — no physical swap needed.
# keyd makes Super behave like macOS Cmd for app shortcuts, while preserving
# Super in multi-modifier WM combos so COSMIC/Pop Shell sees the exact same
# modifiers as AeroSpace on macOS.
#
# Unified Mac-like modifiers (Linux + keyd):
#   Super + letter      → Ctrl+letter     (Cmd+C = copy OS-wide)
#   Super + arrows      → Home/End        (text navigation)
#   Super (tap)         → bare Super      (COSMIC launcher)
#   Super+Alt + key     → Super+Alt+key   (WM workspaces)
#   Ctrl+Super+Alt      → LCAG passthrough (WM focus/layout)
#   Alt + arrows        → word navigation (Option — per-app)
#   Ctrl + arrows       → Ctrl+arrows     (Control — splits, emacs)
#
# games-classic.conf: Steam/games → native keys (no Cmd remap).

[ids]
*

[main]
# Super: hold → command layer (Cmd-like), tap → bare Super (launcher)
leftmeta = overload(command, leftmeta)
rightmeta = overload(command, leftmeta)

# Alt is NOT remapped at system level.
# Word navigation (Alt+arrows) is handled per-app:
#   - Cursor/VS Code: keybindings.json (isLinux rules)
#   - WezTerm/zsh: shell keybindings (bindkey)
#   - GTK apps: Alt+arrows already does word-nav in most text fields
# This avoids conflicts with Ctrl+arrows (split navigation).

[command]
# ══════════════════════════════════════════════════════════════════
# OS-wide: Super+key → Ctrl+key (physical Cmd = Mac Cmd for app shortcuts)
# ══════════════════════════════════════════════════════════════════
a = C-a
b = C-b
c = C-c
d = C-d
e = C-e
f = C-f
g = C-g
h = C-h
i = C-i
j = C-j
k = C-k
l = C-l
n = C-n
o = C-o
p = C-p
q = C-q
r = C-r
s = C-s
t = C-t
u = C-u
v = C-v
w = C-w
x = C-x
y = C-y
z = C-z
/ = C-/

shift-z = C-shift-z
shift-t = C-shift-t
shift-n = C-shift-n
shift-s = C-shift-s
shift-f = C-shift-f
shift-p = C-shift-p
shift-d = C-shift-d

1 = C-1
2 = C-2
3 = C-3
4 = C-4
5 = C-5
6 = C-6
7 = C-7
8 = C-8
9 = C-9

# ══════════════════════════════════════════════════════════════════
# TEXT NAVIGATION: Super+arrows → Home/End (macOS Cmd+arrows)
# ══════════════════════════════════════════════════════════════════
left = home
right = end
up = C-home
down = C-end
shift-left = shift-home
shift-right = shift-end
shift-up = C-shift-home
shift-down = C-shift-end

# ══════════════════════════════════════════════════════════════════
# WM PASSTHROUGH — preserve Super for multi-modifier combos
# Modifier-qualified entries override bare entries in keyd.
# Output M- (Meta/Super) so the compositor sees the same modifiers
# as AeroSpace on macOS.
# ══════════════════════════════════════════════════════════════════

# ── Focus window: Ctrl+Super+Alt+arrows → LCAG (AeroSpace) ────
C-A-left = M-C-A-left
C-A-right = M-C-A-right
C-A-up = M-C-A-up
C-A-down = M-C-A-down

# ── Move window: Ctrl+Super+Alt+Shift+arrows → HYPR ───────────
C-A-S-left = M-C-A-S-left
C-A-S-right = M-C-A-S-right
C-A-S-up = M-C-A-S-up
C-A-S-down = M-C-A-S-down

# ── Workspace N: Super+Alt+number → cmd-alt-N ─────────────────
A-0 = M-A-0
A-1 = M-A-1
A-2 = M-A-2
A-3 = M-A-3
A-4 = M-A-4
A-5 = M-A-5
A-6 = M-A-6
A-7 = M-A-7
A-8 = M-A-8
A-9 = M-A-9

# ── Move to workspace: Super+Alt+Shift+number → cmd-alt-shift-N
A-S-0 = M-A-S-0
A-S-1 = M-A-S-1
A-S-2 = M-A-S-2
A-S-3 = M-A-S-3
A-S-4 = M-A-S-4
A-S-5 = M-A-S-5
A-S-6 = M-A-S-6
A-S-7 = M-A-S-7
A-S-8 = M-A-S-8
A-S-9 = M-A-S-9

# ── Workspace prev/next: Super+Alt+Left/Right → cmd-alt-arrows ─
A-left = M-A-left
A-right = M-A-right
A-S-left = M-A-S-left
A-S-right = M-A-S-right

# ── Monitor focus/move: Super+Alt+Up/Down → cmd-alt-up/down ────
A-up = M-A-up
A-down = M-A-down
A-S-up = M-A-S-up
A-S-down = M-A-S-down
A-S-tab = M-A-S-tab

# ── Workspace back-and-forth: Super+Alt+Tab → cmd-alt-tab ──────
A-tab = M-A-tab

# ── Layout toggles: Ctrl+Super+Alt+key → LCAG+key ──────────────
C-A-s = M-C-A-s
C-A-w = M-C-A-w
C-A-e = M-C-A-e
C-A-t = M-C-A-t
C-A-f = M-C-A-f
C-A-g = M-C-A-g
C-A-y = M-C-A-y
C-A-o = M-C-A-o
C-A-x = M-C-A-x
C-A-r = M-C-A-r
C-A-m = M-C-A-m

# ── Join-with: LCAG+key (AeroSpace) ────────────────────────────
C-A-l = M-C-A-l
C-A-u = M-C-A-u
C-A-d = M-C-A-d

# ── Input source switch: LCAG+I ──────────────────────────────
C-A-i = M-C-A-i

# ── Balance / Resize: LCAG+equal, HYPR+minus/equal ─────────────
C-A-equal = M-C-A-equal
C-A-S-minus = M-C-A-S-minus
C-A-S-equal = M-C-A-S-equal
C-A-S-f = M-C-A-S-f

# ── Terminal: LCAG+Enter / LCAG+backtick ────────────────────────
C-A-enter = M-C-A-enter
C-A-` = M-C-A-`

# ── Service mode: HYPR+semicolon ───────────────────────────────
C-A-S-semicolon = M-C-A-S-semicolon

# ── System: Super+Escape → lock screen ─────────────────────────
escape = M-escape

# ══════════════════════════════════════════════════════════════════
# OTHER SUPER COMBOS
# ══════════════════════════════════════════════════════════════════

# ── Cmd+Backspace → delete to start of line ───────────────────
backspace = S-home+delete

# ── Cmd+Enter ─────────────────────────────────────────────────
enter = C-enter

# ── App switching: Cmd+Tab → Alt+Tab ──────────────────────────
tab = A-tab
shift-tab = A-shift-tab
` = A-`

# ── Cmd+Space → launch (launcher shortcut if needed) ──────────
space = M-space

# Input source switch is Ctrl+Super+Alt+I (physical Ctrl+Cmd+Alt+I).
# COSMIC/GNOME binds InputSourceSwitch to [Super,Ctrl,Alt]+I.

# ── Cmd+[ / ] → back/forward ──────────────────────────────────
[ = A-left
] = A-right
