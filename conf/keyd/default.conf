# https://github.com/rvaiya/keyd
# /etc/keyd/default.conf — macOS-like behavior on Linux
#
# Custom keyboard (QMK) sends the correct keycodes — no physical swap needed.
# keyd makes Super behave like macOS Cmd for app shortcuts, while preserving
# Super in multi-modifier WM combos so COSMIC/Pop Shell sees the exact same
# modifiers as AeroSpace on macOS.
#
# Unified Mac-like modifiers (Linux + keyd):
#   Super + letter      → Ctrl+letter     (Cmd+C = copy OS-wide)
#   Super + arrows      → Home/End        (text navigation in apps)
#   Super (tap)         → bare Super      (COSMIC launcher)
#   LCAG / HYPR / Cmd+Alt → remapped to COSMIC *default* Super chords (below)
#
# games-classic.conf: Steam/games → native keys (no Cmd remap).

[ids]
*

[main]
# Super: hold → command layer (Cmd-like), tap → bare Super (launcher)
leftmeta = overload(command, leftmeta)
rightmeta = overload(command, leftmeta)

# Alt is NOT remapped at system level.
# Word navigation (Alt+arrows) is handled per-app:
#   - Cursor/VS Code: keybindings.json (isLinux rules)
#   - WezTerm/zsh: shell keybindings (bindkey)
#   - GTK apps: Alt+arrows already does word-nav in most text fields
# This avoids conflicts with Ctrl+arrows (split navigation).

[command]
# ══════════════════════════════════════════════════════════════════
# OS-wide: Super+key → Ctrl+key (physical Cmd = Mac Cmd for app shortcuts)
# ══════════════════════════════════════════════════════════════════
a = C-a
b = C-b
c = C-c
d = C-d
e = C-e
f = C-f
g = C-g
h = C-h
i = C-i
j = C-j
k = C-k
l = C-l
n = C-n
o = C-o
p = C-p
q = C-q
r = C-r
s = C-s
t = C-t
u = C-u
v = C-v
w = C-w
x = C-x
y = C-y
z = C-z
/ = C-/

shift-z = C-shift-z
shift-t = C-shift-t
shift-n = C-shift-n
shift-s = C-shift-s
shift-f = C-shift-f
shift-p = C-shift-p
shift-d = C-shift-d

1 = C-1
2 = C-2
3 = C-3
4 = C-4
5 = C-5
6 = C-6
7 = C-7
8 = C-8
9 = C-9

# ══════════════════════════════════════════════════════════════════
# TEXT NAVIGATION: Super+arrows → Home/End (macOS Cmd+arrows)
# ══════════════════════════════════════════════════════════════════
left = home
right = end
up = C-home
down = C-end
shift-left = shift-home
shift-right = shift-end
shift-up = C-shift-home
shift-down = C-shift-end

# ══════════════════════════════════════════════════════════════════
# WM — physical AeroSpace chords → COSMIC default keybindings
# (Custom shortcuts.ron only adds WezTerm/Cursor/clipboard/Ctrl+Q.)
# See: /usr/share/cosmic/.../CosmicSettings.Shortcuts/v1/defaults
# ══════════════════════════════════════════════════════════════════

# ── Focus: LCAG+arrows → Super+arrows ───────────────────────────
C-A-left = M-left
C-A-right = M-right
C-A-up = M-up
C-A-down = M-down

# ── Move: HYPR+arrows → Super+Shift+arrows ──────────────────────
C-A-S-left = M-S-left
C-A-S-right = M-S-right
C-A-S-up = M-S-up
C-A-S-down = M-S-down

# ── Workspace N: Cmd+Alt+N → Super+N ──────────────────────────────
A-0 = M-0
A-1 = M-1
A-2 = M-2
A-3 = M-3
A-4 = M-4
A-5 = M-5
A-6 = M-6
A-7 = M-7
A-8 = M-8
A-9 = M-9

# ── Move to workspace: Cmd+Alt+Shift+N → Super+Shift+N ──────────
A-S-0 = M-S-0
A-S-1 = M-S-1
A-S-2 = M-S-2
A-S-3 = M-S-3
A-S-4 = M-S-4
A-S-5 = M-S-5
A-S-6 = M-S-6
A-S-7 = M-S-7
A-S-8 = M-S-8
A-S-9 = M-S-9

# ── WS prev/next: Cmd+Alt+←/→ → Super+Ctrl+←/→ ─────────────────
A-left = M-C-left
A-right = M-C-right
A-S-left = M-S-C-left
A-S-right = M-S-C-right

# ── Monitor: Cmd+Alt+↑/↓ → Super+Alt+↑/↓ (COSMIC default) ───────
A-up = M-A-up
A-down = M-A-down
A-S-up = M-A-S-up
A-S-down = M-A-S-down

# ── Layout / tiling: LCAG+key → Super+key ───────────────────────
C-A-y = M-y
C-A-g = M-g
C-A-s = M-s
C-A-o = M-o
C-A-x = M-x
C-A-m = M-m
C-A-f = M-F11
C-A-r = M-r
C-A-S-r = M-S-r
C-A-equal = M-r
C-A-S-minus = M-S-r

# ── Terminal spawn (custom shortcut, keep LCAG chord) ─────────────
C-A-enter = M-C-A-enter
C-A-` = M-C-A-`

# ── Input source: LCAG+I → Super+Space ──────────────────────────
C-A-i = M-space

# ── Lock: Cmd+Escape ────────────────────────────────────────────
escape = M-escape

# ══════════════════════════════════════════════════════════════════
# OTHER SUPER COMBOS
# ══════════════════════════════════════════════════════════════════

# ── Cmd+Backspace → delete to start of line ───────────────────
backspace = S-home+delete

# ── Cmd+Enter ─────────────────────────────────────────────────
enter = C-enter

# ── App switching: Cmd+Tab → Alt+Tab ──────────────────────────
tab = A-tab
shift-tab = A-shift-tab
` = A-`

# ── Cmd+Space → input source (COSMIC default: Super+Space) ───────
space = M-space

# ── Cmd+[ / ] → back/forward ──────────────────────────────────
[ = A-left
] = A-right
