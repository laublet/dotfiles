# /etc/keyd/default.conf — macOS-like behavior on Linux
#
# Custom keyboard (QMK) sends the correct keycodes — no physical swap needed.
# keyd only makes Super behave like macOS Cmd, and Alt+arrows do word navigation.
#
# Result:
#   Ctrl         → Ctrl (split navigation, unchanged)
#   Alt + arrows → word navigation (like macOS Option+arrows)
#   Alt + key    → Alt (special chars, menus — unchanged)
#   Super + key  → Ctrl+key (app shortcuts, like macOS Cmd)
#   Super + arrows → Home/End (like macOS Cmd+arrows)

[ids]
*

[main]
# Super → macOS Cmd behavior
leftmeta = layer(command)
rightmeta = layer(command)

# Alt is NOT remapped at system level.
# Word navigation (Alt+arrows) is handled per-app:
#   - Cursor/VS Code: keybindings.json (isLinux rules)
#   - WezTerm/zsh: shell keybindings (bindkey)
#   - GTK apps: Alt+arrows already does word-nav in most text fields
# This avoids conflicts with Ctrl+arrows (split navigation).

[command]
# ── App shortcuts: Cmd+key → Ctrl+key ─────────────────────────
a = C-a
b = C-b
c = C-c
d = C-d
e = C-e
f = C-f
g = C-g
h = C-h
i = C-i
j = C-j
k = C-k
l = C-l
n = C-n
o = C-o
p = C-p
q = C-q
r = C-r
s = C-s
t = C-t
u = C-u
v = C-v
w = C-w
x = C-x
y = C-y
z = C-z
/ = C-/

# ── Shift variants ────────────────────────────────────────────
shift-z = C-shift-z
shift-t = C-shift-t
shift-n = C-shift-n
shift-s = C-shift-s
shift-f = C-shift-f
shift-p = C-shift-p
shift-d = C-shift-d

# ── Tab switching: Cmd+1-9 → Ctrl+1-9 ────────────────────────
1 = C-1
2 = C-2
3 = C-3
4 = C-4
5 = C-5
6 = C-6
7 = C-7
8 = C-8
9 = C-9

# ── Cmd+arrows → Home/End (macOS behavior) ────────────────────
left = home
right = end
up = C-home
down = C-end
shift-left = shift-home
shift-right = shift-end
shift-up = C-shift-home
shift-down = C-shift-end

# ── Cmd+Backspace → delete to start of line ───────────────────
backspace = S-home+delete

# ── Cmd+Enter ─────────────────────────────────────────────────
enter = C-enter

# ── App switching: Cmd+Tab → Alt+Tab ──────────────────────────
tab = A-tab
shift-tab = A-shift-tab
` = A-`

# ── Cmd+Space → real Super (GNOME launcher) ───────────────────
space = leftmeta

# ── Cmd+[ / ] → back/forward ──────────────────────────────────
[ = A-left
] = A-right
