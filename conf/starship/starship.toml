# ~/.config/starship.toml — Loïc
# Dracula palette · lean style · single line · right prompt

"$schema" = 'https://starship.rs/config-schema.json'

palette = "dracula"

add_newline = false
scan_timeout = 100
# Prevent sporadic timeout on external version commands (e.g. mise node)
command_timeout = 2_000

# ── Left prompt: [SSH icon + user@host] + directory + separator ──
# Username + hostname only render in SSH sessions (or as root); local prompt
# stays unchanged. The SSH icon lives in the username format and is gated by
# show_always=false, so it only appears alongside the user.
format = """
$username\
$hostname\
$directory\
$character"""

# ── Right prompt: git + node + cmd_duration + time ───────────────
right_format = """
$git_branch\
$git_status\
[ ](fg:comment)\
$nodejs\
$cmd_duration\
$time"""

# ── Prompt character (vi mode aware) ─────────────────────────────
[character]
success_symbol = "[›](bold green)"
error_symbol = "[›](bold red)"
vimcmd_symbol = "[‹](bold yellow)"
vimcmd_replace_one_symbol = "[‹](bold orange)"
vimcmd_replace_symbol = "[‹](bold orange)"

# ── Username (SSH/root only) ─────────────────────────────────────
# show_always=false → renders only when SSH session or running as root.
# The leading SSH icon (Nerd Font: nf-fa-server) is part of the format and
# inherits a bold-orange style independent of $user, so the icon stays
# orange even when the user is non-root.
[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[ ](bold orange)[$user]($style)"
show_always = false
disabled = false

# ── Hostname (SSH only) ──────────────────────────────────────────
# Renders "@hostname" right after the username, only in SSH sessions
# (regardless of the source IP — works fine over Tailscale).
[hostname]
ssh_only = true
ssh_symbol = ""
format = "[@$hostname]($style) "
style = "bold orange"
disabled = false

# ── Directory ────────────────────────────────────────────────────
[directory]
style = "purple"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
format = "[ $path]($style)[$read_only]($style) "

# ── Git branch ───────────────────────────────────────────────────
[git_branch]
style = "bold pink"
format = "[ $branch(:$remote_branch)]($style) "

# ── Git status ───────────────────────────────────────────────────
[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "*${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

# ── Node.js ──────────────────────────────────────────────────────
[nodejs]
style = "bold green"
format = "[ $version]($style) "
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = []

# ── Command duration (only if > 3s) ─────────────────────────────
[cmd_duration]
style = "bold yellow"
min_time = 3_000
format = "[ $duration]($style) "

# ── Time ─────────────────────────────────────────────────────────
[time]
disabled = false
style = "fg:comment"
format = "[ $time]($style)"
time_format = "%H:%M"

# ── Disabled modules ─────────────────────────────────────────────
[aws]
disabled = true

[gcloud]
disabled = true

[docker_context]
disabled = true

[package]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[java]
disabled = true

[golang]
disabled = true

# ── Dracula palette ──────────────────────────────────────────────
[palettes.dracula]
background = "#282a36"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"
