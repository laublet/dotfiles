# Using Tmux 2.3 on Debian 9
# Priority: prefix key and reloading tmux.conf:
#-------------------------------------------------------#

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Update tmux conf file
bind-key e split-window -h "nvim ~/.tmux.conf"
bind-key E split-window -h "nvim ~/.mytheme.tmuxtheme"

# Reload tmux conf file
unbind r
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Bigger history
set -g history-limit 10000

# Fix issue with smaller client screens
setw -g aggressive-resize on

# Focus events enabled for terminals that support them
set -g focus-events on

# Monitor window activity
setw -g monitor-activity on

# Fix garbage in gnome-terminal
set-option -s set-clipboard off

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

#-------------------------------------------------------#

# Terminal admin:
#-------------------------------------------------------#

# Set mouse off/on - if off, forces you to use keyboard with prefix-[
set -g mouse on
# set -g mouse off

# 256 colours
set -g default-terminal "screen-256color"

# Start counting windows/panes from 1
set -g base-index 1
setw -g pane-base-index 1

#-------------------------------------------------------#

# PANE NAVIGATION/MANAGEMENT
#-------------------------------------------------------#

# Split panes
unbind '"'
unbind %
bind v split-window -h -c '#{pane_current_path}'
bind b split-window -v -c '#{pane_current_path}'
#bind c new-window -c '#{pane_current_path}'

# Toggle pane synchronization
bind S set synchronize-panes

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-vi or Alt-arrow bindings keys WITHOUT PREFIX KEY to switch panes
bind -n M-h select-pane -L
bind -n M-Left select-pane -L
bind -n M-l select-pane -R
bind -n M-Right select-pane -R
bind -n M-k select-pane -U
bind -n M-Up select-pane -U
bind -n M-j select-pane -D
bind -n M-Down select-pane -D

# Swap panes with Alt-Shift-vi
bind -n M-H swap-pane -D       # swap current pane with the next one
bind -n M-L swap-pane -U       # swap current pane with the previous one

# Resizing panes
bind -r H resize-pane -L 2
bind -r Left resize-pane -L 2
bind -r J resize-pane -D 2
bind -r Down resize-pane -D 2
bind -r K resize-pane -U 2
bind -r Up resize-pane -U 2
bind -r L resize-pane -R 2
bind -r Right resize-pane -R 2

#-------------------------------------------------------#

# Windows NAVIGATION/MANAGEMENT
#-------------------------------------------------------#

# Ctrl+Alt+vi to switch windows
bind -n C-M-h  previous-window
bind -n C-M-L next-window

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Don't rename windows automatically
set-option -g allow-rename off

#-------------------------------------------------------#

# Copy mode settings
#-------------------------------------------------------#

# Enable vi keybindings in copy mode
set-window-option -g mode-keys vi

bind p paste-buffer

# Tmux < 2.4
# unbind-key -t vi-copy v
# bind-key -t vi-copy 'v' begin-selection
# bind-key -t vi-copy 'y' copy-selection
# bind-key -t vi-copy 'C-v' rectangle-toggle

# # Copy to clipboard
# bind -t vi-copy y copy-pipe 'xclip -in -selection clipboard'

# Tmux > 2.4
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Copy to clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"

# Enter Copy mode with Prefix + ctrl + c
bind C-c copy-mode

#-------------------------------------------------------#

# Theme
# At home (tmux > 2.9)
# source-file ~/.home.tmuxtheme
# Office (tmux < 2.9)
# source-file ~/.mytheme.tmuxtheme

# PREFIX + I to install pluging

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'dracula/tmux'

## Dracula Theme configuration (see: <https://draculatheme.com/tmux>)

set -g @dracula-plugins "network time"

set -g @dracula-show-timezone false
set -g @dracula-day-month true
set -g @dracula-show-powerline false

set -g @dracula-border-contrast true

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run -b '~/.tmux/plugins/tpm/tpm'
run '~/.tmux/plugins/tpm/tpm'
