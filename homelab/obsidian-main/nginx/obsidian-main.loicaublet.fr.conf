# Deploy to uruk: ~/homelab/proxy/nginx/conf.d/obsidian-main.conf
# CouchDB on host :5984 — nginx container uses host.docker.internal

upstream obsidian_main_couchdb {
    server 192.168.1.104:5984;
    keepalive 4;
}

server {
    listen 80;
    server_name obsidian-main.loicaublet.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name obsidian-main.loicaublet.fr;

    ssl_certificate /etc/letsencrypt/live/obsidian-main.loicaublet.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obsidian-main.loicaublet.fr/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    add_header X-Content-Type-Options nosniff always;

    location = / {
        return 403;
    }

    # LiveSync URI path — must match conf/local.ini authentication_redirect (/vault/...)
    location /vault/ {
        rewrite ^/vault/(.*) /$1 break;
        proxy_pass http://obsidian_main_couchdb;
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
