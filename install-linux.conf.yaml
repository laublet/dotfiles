# https://github.com/anishathalye/dotbot
# Linux desktop (Pop!_OS / Ubuntu) — extends shared install.conf.yaml

- defaults:
    link:
      create: true
      relink: true

- link:
    # ssh (Linux — no UseKeychain)
    ~/.ssh/config:
      path: conf/ssh/config.linux

    # cursor (Linux path)
    ~/.config/Cursor/User/keybindings.json:
      create: true
      path: conf/cursor/keybindings.json
    ~/.config/Cursor/User/settings.json:
      create: true
      path: conf/cursor/settings.json

    # lazydocker (XDG path)
    ~/.config/lazydocker/config.yml:
      create: true
      path: conf/lazydocker/config.yml

    # rofi (launcher + clipboard via greenclip)
    ~/.config/rofi:
      create: true
      path: conf/rofi

    # greenclip (clipboard manager for rofi)
    ~/.config/greenclip.toml:
      path: conf/greenclip/greenclip.toml

    # clipboard script (Wayland: cliphist / X11: greenclip)
    ~/.local/bin/clipboard-rofi:
      create: true
      path: bin/clipboard-rofi
    ~/.local/bin/cliphist-wl-daemon:
      create: true
      path: bin/cliphist-wl-daemon

    # Wayland clipboard daemon autostart (COSMIC / Pop 24)
    ~/.config/autostart/cliphist-wl-daemon.desktop:
      create: true
      path: conf/autostart/cliphist-wl-daemon.desktop

- shell:
    # keyd: macOS-like modifiers (requires root)
    - command: |
        if command -v keyd &>/dev/null && [ -f conf/keyd/default.conf ]; then
          echo "Deploying keyd config..."
          sudo cp conf/keyd/default.conf conf/keyd/games-classic.conf /etc/keyd/
          sudo rm -f /etc/keyd/mac-cmd-passthrough.conf
          sudo systemctl restart keyd
        fi
      description: Deploying keyd config (macOS-like modifiers)
      quiet: true

    # COSMIC DE keybindings (Pop!_OS 24.04+)
    - command: |
        if [ -d ~/.config/cosmic ] && [ -d conf/cosmic ]; then
          echo "Deploying COSMIC config..."
          COSMIC_SHORTCUTS=~/.config/cosmic/com.system76.CosmicSettings.Shortcuts/v1
          mkdir -p "$COSMIC_SHORTCUTS"
          cp conf/cosmic/shortcuts.ron "$COSMIC_SHORTCUTS/custom"
          for pkg in conf/cosmic/com.system76.*; do
            [ -d "$pkg" ] || continue
            mkdir -p ~/.config/cosmic/"$(basename "$pkg")"
            cp -r "$pkg"/* ~/.config/cosmic/"$(basename "$pkg")"/
          done
        fi
      description: Deploying COSMIC keybindings and panel/tiling config
      quiet: true

    # Pop Shell + GNOME settings (legacy — Pop!_OS 22.04 with GNOME)
    - command: |
        if command -v dconf &>/dev/null && [ -f conf/pop-shell/keybindings.dconf ] && ! [ -d ~/.config/cosmic ]; then
          echo "Applying Pop Shell + GNOME settings..."
          dconf load / < conf/pop-shell/keybindings.dconf
        fi
      description: Applying Pop Shell + GNOME settings (legacy)
      quiet: true
