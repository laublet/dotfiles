# Linux desktop (Pop!_OS / Ubuntu) — extends shared install.conf.yaml

- defaults:
    link:
      create: true
      relink: true

- link:
    # cursor (Linux path)
    ~/.config/Cursor/User/keybindings.json:
      create: true
      path: conf/cursor/keybindings.json
    ~/.config/Cursor/User/settings.json:
      create: true
      path: conf/cursor/settings.json

    # lazygit (XDG path)
    ~/.config/lazygit/config.yml:
      create: true
      path: conf/lazygit/config.yml

    # lazydocker (XDG path)
    ~/.config/lazydocker/config.yml:
      create: true
      path: conf/lazydocker/config.yml

    # albert (Linux path — ~/.config instead of ~/Library/Preferences)
    ~/.config/albert/config:
      create: true
      force: true
      path: conf/albert/config

- shell:
    # keyd: macOS-like modifiers (requires root)
    - command: |
        if command -v keyd &>/dev/null && [ -f conf/keyd/default.conf ]; then
          echo "Deploying keyd config..."
          sudo cp conf/keyd/default.conf /etc/keyd/default.conf
          sudo systemctl restart keyd
        fi
      description: Deploying keyd config (macOS-like modifiers)
      quiet: true

    # COSMIC DE keybindings (Pop!_OS 24.04+)
    - command: |
        COSMIC_DIR=~/.config/cosmic/com.system76.CosmicSettings.Shortcuts/v1
        if [ -d ~/.config/cosmic ] && [ -f conf/cosmic/shortcuts.ron ]; then
          echo "Deploying COSMIC custom keybindings..."
          mkdir -p "$COSMIC_DIR"
          cp conf/cosmic/shortcuts.ron "$COSMIC_DIR/custom"
        fi
      description: Deploying COSMIC keybindings
      quiet: true

    # Pop Shell + GNOME settings (legacy — Pop!_OS 22.04 with GNOME)
    - command: |
        if command -v dconf &>/dev/null && [ -f conf/pop-shell/keybindings.dconf ] && ! [ -d ~/.config/cosmic ]; then
          echo "Applying Pop Shell + GNOME settings..."
          dconf load / < conf/pop-shell/keybindings.dconf
        fi
      description: Applying Pop Shell + GNOME settings (legacy)
      quiet: true
