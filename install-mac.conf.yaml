# https://github.com/anishathalye/dotbot
# macOS-specific dotfiles

- defaults:
    link:
      create: true
      relink: true

- link:
    # aerospace
    ~/.config/aerospace:
      create: true
      path: conf/aerospace

    # lazydocker (macOS path)
    ~/Library/Application Support/jesseduffield/lazydocker/config.yml:
      create: true
      path: conf/lazydocker/config.yml

    # cursor (macOS path)
    ~/Library/Application Support/Cursor/User/keybindings.json:
      create: true
      path: conf/cursor/keybindings.json
    ~/Library/Application Support/Cursor/User/settings.json:
      create: true
      path: conf/cursor/settings.json

    # local bin (added to PATH via zshrc darwin block)
    ~/.local/bin/mac-startup-clean:
      create: true
      path: bin/mac-startup-clean
    ~/.local/bin/wezterm-output-picker:
      create: true
      path: bin/wezterm-output-picker
    ~/.local/bin/mac-neovim-defaults:
      create: true
      path: bin/mac-neovim-defaults
    # Neovim.app wrapper (bob nvim) for Finder / duti default handlers
    ~/Applications/Neovim.app:
      create: true
      path: conf/mac-apps/Neovim-bob.app

- shell:
    # Import Mac app configs (Choosy, SteerMouse, LanguageTool)
    - command: |
        [ -f conf/mac-apps/choosy.plist ] && defaults import com.choosyosx.Choosy conf/mac-apps/choosy.plist || true
        [ -f conf/mac-apps/choosy-behaviours.plist ] && mkdir -p ~/Library/Application\ Support/Choosy && cp conf/mac-apps/choosy-behaviours.plist ~/Library/Application\ Support/Choosy/behaviours.plist || true
        [ -f conf/mac-apps/steermouse.plist ] && defaults import jp.plentycom.app.SteerMouse conf/mac-apps/steermouse.plist || true
        [ -f conf/mac-apps/languagetool.plist ] && defaults import org.languagetool.desktop conf/mac-apps/languagetool.plist || true
        [ -f conf/mac-apps/amphetamine.plist ] && defaults import com.if.Amphetamine conf/mac-apps/amphetamine.plist || true
        MOUSELESS_DIR=~/Library/Containers/net.sonuscape.mouseless/Data/.mouseless/configs
        [ -f conf/mac-apps/mouseless.yaml ] && mkdir -p "$MOUSELESS_DIR" && cp conf/mac-apps/mouseless.yaml "$MOUSELESS_DIR/config.yaml" || true
        chmod +x ~/.local/bin/mac-startup-clean ~/.local/bin/wezterm-output-picker \
          ~/.local/bin/mac-neovim-defaults ~/.local/bin/yazi-pick 2>/dev/null || true
        chmod +x ~/Applications/Neovim.app/Contents/MacOS/nvim 2>/dev/null || true
        if command -v duti >/dev/null && [[ -x "$HOME/.local/bin/mac-neovim-defaults" ]]; then
          "$HOME/.local/bin/mac-neovim-defaults"
        fi
      description: Importing Mac app configs
      quiet: true

    # Input source toggle: Ctrl+Cmd+Alt+I → "Select previous input source"
    # Symbolic hotkey 60 = "Select the previous input source"
    # Parameters: (ASCII 105=i, keycode 34=I, modifier flags 1835008=Ctrl+Cmd+Alt)
    # Note: add "US International - PC" input source manually in System Settings > Keyboard > Input Sources
    # A logout/login is required for macOS to pick up the new shortcut.
    - command: |
        PLIST=~/Library/Preferences/com.apple.symbolichotkeys.plist
        /usr/libexec/PlistBuddy -c "Delete :AppleSymbolicHotKeys:60" "$PLIST" 2>/dev/null || true
        /usr/libexec/PlistBuddy \
          -c "Add :AppleSymbolicHotKeys:60 dict" \
          -c "Add :AppleSymbolicHotKeys:60:enabled bool true" \
          -c "Add :AppleSymbolicHotKeys:60:value dict" \
          -c "Add :AppleSymbolicHotKeys:60:value:type string standard" \
          -c "Add :AppleSymbolicHotKeys:60:value:parameters array" \
          -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 105" \
          -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 34" \
          -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 1835008" \
          "$PLIST"
      description: Setting input source toggle shortcut (Ctrl+Cmd+Alt+I)
      quiet: true
