# https://github.com/anishathalye/dotbot
# Shared dotfiles — linked on all platforms (macOS, Linux, server)
# OS-specific links live in install-mac.conf.yaml / install-linux.conf.yaml

- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # git
    ~/.gitconfig:
      path: conf/git/gitconfig
    ~/.gitignore:
      path: conf/git/gitignore
    ~/dev/perso/.gitconfig-perso:
      path: conf/git/gitconfig-perso

    # ssh (OS-specific config in install-mac/linux; shared hosts below)
    ~/.ssh/hosts:
      path: conf/ssh/hosts

    # neovim
    ~/.config/nvim:
      create: true
      path: conf/nvim

    # vim
    ~/.vimrc:
      path: conf/vim/vimrc

    # starship
    ~/.config/starship.toml:
      create: true
      path: conf/starship/starship.toml

    # yazi
    ~/.config/yazi:
      create: true
      path: conf/yazi

    # obsidian (vault: ~/dev/perso/vaults/Main)
    ~/dev/perso/vaults/Main/.obsidian.vimrc:
      force: true
      path: conf/obsidian/obsidian-vimrc
    ~/dev/perso/vaults/Main/.obsidian/hotkeys.json:
      force: true
      path: conf/obsidian/hotkeys.json
    ~/dev/perso/vaults/Main/.obsidian/app.json:
      force: true
      path: conf/obsidian/app.json
    ~/dev/perso/vaults/Main/.obsidian/community-plugins.json:
      force: true
      path: conf/obsidian/community-plugins-main.json
    ~/dev/perso/vaults/Main/.obsidian/plugins/notebook-navigator/data.json:
      force: true
      path: conf/obsidian/notebook-navigator.json
    ~/dev/perso/vaults/Main/.gitignore:
      force: true
      path: conf/obsidian/vault-main.gitignore

    # tridactyl (Firefox)
    ~/.config/tridactyl/tridactylrc:
      create: true
      path: conf/tridactyl/tridactylrc

    # wezterm (XDG)
    ~/.config/wezterm/wezterm.lua:
      create: true
      path: conf/wezterm/.wezterm.lua
    ~/.config/wezterm/platform.lua:
      create: true
      path: conf/wezterm/platform.lua

    # zed (XDG on macOS + Linux)
    ~/.config/zed/settings.json:
      create: true
      force: true
      path: conf/zed/settings.json
    ~/.config/zed/keymap.json:
      create: true
      force: true
      path: conf/zed/keymap.json

    # atuin
    ~/.config/atuin/config.toml:
      create: true
      force: true
      path: conf/atuin/config.toml

    # btop
    ~/.config/btop/btop.conf:
      create: true
      force: true
      path: conf/btop/btop.conf

    # mise
    ~/.config/mise/config.toml:
      create: true
      force: true
      path: conf/mise/config.toml

    # bottom
    ~/.config/bottom/bottom.toml:
      create: true
      path: conf/bottom/bottom.toml

    # zellij
    ~/.config/zellij:
      create: true
      path: conf/zellij

    # local bin (cross-platform helpers; mac-only scripts linked in install-mac.conf.yaml)
    ~/.local/bin/yazi-pick:
      create: true
      path: bin/yazi-pick
    ~/.local/bin/glab-pick:
      create: true
      path: bin/glab-pick
    ~/.local/bin/sg-pick:
      create: true
      path: bin/sg-pick
    ~/.local/bin/nvim-keylog-analyze:
      create: true
      path: bin/nvim-keylog-analyze
    ~/.local/bin/dotfiles-doctor:
      create: true
      path: bin/dotfiles-doctor
    ~/.local/bin/install-slk-tui:
      create: true
      path: bin/install-slk-tui
    ~/.local/bin/install-glum:
      create: true
      path: bin/install-glum
    ~/.local/bin/readmd:
      create: true
      path: bin/readmd
    ~/.local/bin/readweb:
      create: true
      path: bin/readweb
    ~/.local/bin/mdfocus-launch:
      create: true
      path: bin/mdfocus-launch
    # macOS Choosy URL opener (harmless on Linux; zsh only wraps open on darwin)
    ~/.local/bin/mac-open:
      create: true
      path: bin/mac-open

    # zsh
    ~/.zshenv:
      force: true
      path: conf/zsh/zshenv
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc

- shell:
    - [git submodule update --init --recursive, Installing submodules]
