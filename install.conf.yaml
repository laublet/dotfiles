# Shared dotfiles — linked on all platforms (macOS, Linux, server)
# OS-specific links live in install-mac.conf.yaml / install-linux.conf.yaml

- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # git
    ~/.gitconfig:
      path: conf/git/gitconfig
    ~/.gitignore:
      path: conf/git/gitignore
    ~/dev/perso/.gitconfig-perso:
      path: conf/git/gitconfig-perso

    # ssh (config only — keys are NOT tracked)
    ~/.ssh/config:
      path: conf/ssh/config

    # neovim
    ~/.config/nvim:
      create: true
      path: conf/nvim

    # vim
    ~/.vimrc:
      path: conf/vim/vimrc

    # starship
    ~/.config/starship.toml:
      create: true
      path: conf/starship/starship.toml

    # yazi
    ~/.config/yazi:
      create: true
      path: conf/yazi

    # obsidian (vault: ~/Documents/Main)
    ~/Documents/Main/.obsidian.vimrc:
      force: true
      path: conf/obsidian/obsidian-vimrc
    ~/Documents/Main/.obsidian/hotkeys.json:
      force: true
      path: conf/obsidian/hotkeys.json
    ~/Documents/Main/.obsidian/app.json:
      force: true
      path: conf/obsidian/app.json
    ~/Documents/Main/.obsidian/community-plugins.json:
      force: true
      path: conf/obsidian/community-plugins.json

    # tridactyl (Firefox)
    ~/.config/tridactyl/tridactylrc:
      create: true
      path: conf/tridactyl/tridactylrc

    # wezterm
    ~/.wezterm.lua:
      create: true
      path: conf/wezterm/.wezterm.lua

    # atuin
    ~/.config/atuin/config.toml:
      create: true
      force: true
      path: conf/atuin/config.toml

    # btop
    ~/.config/btop/btop.conf:
      create: true
      force: true
      path: conf/btop/btop.conf

    # mise
    ~/.config/mise/config.toml:
      create: true
      force: true
      path: conf/mise/config.toml

    # zellij
    ~/.config/zellij:
      create: true
      path: conf/zellij

    # zsh
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc

- shell:
    - [git submodule update --init --recursive, Installing submodules]
