# https://github.com/anishathalye/dotbot
# Optional heavier layer — NOT run by ./install-homeserver by default.
# Adds yazi (file manager), lazydocker, btop / bottom monitors.
# Run manually: dotbot -c server/install-full.conf.yaml

- defaults:
    link:
      create: true
      relink: true

- link:
    # btop
    ~/.config/btop/btop.conf:
      create: true
      force: true
      path: conf/btop/btop.conf

    # yazi
    ~/.config/yazi:
      create: true
      path: conf/yazi

    # lazydocker (XDG path)
    ~/.config/lazydocker/config.yml:
      create: true
      path: conf/lazydocker/config.yml

    # bottom
    ~/.config/bottom/bottom.toml:
      create: true
      path: conf/bottom/bottom.toml
