- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc
    ~/.vimrc: conf/vim/vimrc
    ~/.config/nvim:
      force: true
      path: conf/nvim
    ~/.mytheme.tmuxtheme: conf/tmux/mytheme.tmuxtheme
    ~/.home.tmuxtheme: conf/tmux/home.tmuxtheme
    ~/.tmux.conf: conf/tmux/tmux.conf
    ~/.ctags: conf/ctags/ctags
    ~/.gitconfig:
       force: true
       path: conf/git/gitconfig
    ~/.gitignore: conf/git/gitignore

- shell:
    - [git submodule update --init --recursive, Installing submodules]
