# Server — minimal setup (vim, zsh, nvim, git, tmux)

- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc
    ~/.vimrc: conf/vim/vimrc
    ~/.config/nvim:
      force: true
      path: conf/nvim
    ~/.mytheme.tmuxtheme: archive/tmux/mytheme.tmuxtheme
    ~/.home.tmuxtheme: archive/tmux/home.tmuxtheme
    ~/.tmux.conf: archive/tmux/tmux.conf
    ~/.ctags: archive/ctags/ctags
    ~/.gitconfig:
       force: true
       path: conf/git/gitconfig
    ~/.gitignore: conf/git/gitignore

- shell:
    - [git submodule update --init --recursive, Installing submodules]
