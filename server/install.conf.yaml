# https://github.com/anishathalye/dotbot
# Minimal server — vim, zsh, git, zellij, starship
# For full dev setup (neovim, yazi, btop…) use install-homeserver instead.

- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # zsh
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc

    # vim (minimal editor for server)
    ~/.vimrc: conf/vim/vimrc

    # git
    ~/.gitconfig:
      force: true
      path: conf/git/gitconfig
    ~/.gitignore: conf/git/gitignore

    # starship prompt
    ~/.config/starship.toml:
      create: true
      path: conf/starship/starship.toml

    # zellij (terminal multiplexer)
    ~/.config/zellij:
      create: true
      path: conf/zellij

- shell:
    - [git submodule update --init --recursive, Installing submodules]
