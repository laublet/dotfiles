# https://github.com/anishathalye/dotbot
# Minimal server — shell, editors (nvim default + vim fallback), git, zellij,
# starship, plus the daily goodies (atuin, mise, lazygit). Heavier configs
# (yazi, lazydocker, btop, bottom) live in install-full.conf.yaml.

- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # zsh
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc

    # editors
    ~/.config/nvim:
      create: true
      force: true
      path: conf/nvim
    ~/.vimrc: conf/vim/vimrc

    # git
    ~/.gitconfig:
      force: true
      path: conf/git/gitconfig
    ~/.gitignore: conf/git/gitignore

    # starship prompt
    ~/.config/starship.toml:
      create: true
      path: conf/starship/starship.toml

    # zellij (terminal multiplexer)
    ~/.config/zellij:
      create: true
      path: conf/zellij

    # atuin (shell history search)
    ~/.config/atuin/config.toml:
      create: true
      force: true
      path: conf/atuin/config.toml

    # mise (runtime versions)
    ~/.config/mise/config.toml:
      create: true
      force: true
      path: conf/mise/config.toml

    # lazygit
    ~/.config/lazygit/config.yml:
      create: true
      path: conf/lazygit/config.yml

- shell:
    - [git submodule update --init --recursive, Installing submodules]
