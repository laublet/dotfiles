# Server — minimal setup (vim, zsh, nvim, git, zellij)

- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc
    ~/.vimrc: conf/vim/vimrc
    ~/.config/nvim:
      force: true
      path: conf/nvim
    ~/.config/zellij:
      force: true
      path: conf/zellij
    ~/.gitconfig:
       force: true
       path: conf/git/gitconfig
    ~/.gitignore: conf/git/gitignore

- shell:
    - [git submodule update --init --recursive, Installing submodules]
