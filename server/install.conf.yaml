# https://github.com/anishathalye/dotbot
# Minimal server — shell, vim editor, git, zellij,
# starship, plus the daily goodies (atuin, mise, lazygit). Heavier configs
# (yazi, lazydocker, btop, bottom) live in install-full.conf.yaml.

- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # zsh
    ~/.zshrc:
      force: true
      path: conf/zsh/zshrc
    ~/.zpreztorc:
      force: true
      path: conf/zsh/prezto/zpreztorc

    # editor (vim only — no nvim/LazyVim stack on headless hosts)
    ~/.vimrc: conf/vim/vimrc-server
    ~/.zshrc-server: conf/zsh/zshrc-server

    # git
    ~/.gitconfig:
      force: true
      path: conf/git/gitconfig
    ~/.gitignore: conf/git/gitignore

    # starship prompt
    ~/.config/starship.toml:
      create: true
      path: conf/starship/starship.toml

    # zellij (terminal multiplexer)
    ~/.config/zellij:
      create: true
      path: conf/zellij

    # atuin (shell history search)
    ~/.config/atuin/config.toml:
      create: true
      force: true
      path: conf/atuin/config.toml

    # mise (runtime versions)
    ~/.config/mise/config.toml:
      create: true
      force: true
      path: conf/mise/config.toml

    # lazygit
    ~/.config/lazygit/config.yml:
      create: true
      path: conf/lazygit/config.yml

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    # prezto + fzf-tab contrib (zpreztorc references 'fzf-tab' in pmodule).
    # Idempotent: clones only when missing. Keeps install-server self-healing
    # without requiring a full packages-linux.sh run.
    - command: |
        if [ ! -d "$HOME/.zprezto" ]; then
          git clone --recursive https://github.com/sorin-ionescu/prezto.git "$HOME/.zprezto"
        fi
        if [ ! -d "$HOME/.zprezto/contrib/fzf-tab" ]; then
          git clone https://github.com/Aloxaf/fzf-tab "$HOME/.zprezto/contrib/fzf-tab"
        fi
      description: Ensuring prezto and fzf-tab are installed
